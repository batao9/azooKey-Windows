name: Rust

on:
  push:
  workflow_dispatch:

env:
  SWIFT_VERSION: swift-6.1.2-release
  SWIFT_BUILD: 6.1.2-RELEASE
  LLAMA_RELEASE_VERSION: b4846
  LLAMA_CPU_URL: https://github.com/fkunn1326/llama.cpp/releases/download/b4846/llama-b4846-bin-win-avx-x64.zip
  LLAMA_CUDA_URL: https://github.com/fkunn1326/llama.cpp/releases/download/b4846/llama-b4846-bin-win-cuda-cu12.4-x64.zip
  LLAMA_VULKAN_URL: https://github.com/fkunn1326/llama.cpp/releases/download/b4846/llama-b4846-bin-win-vulkan-x64.zip
  ZENZ_MODEL_URL: https://huggingface.co/Miwa-Keita/zenz-v3-small-gguf/resolve/main/ggml-model-Q5_K_M.gguf

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        cache-bin: true

    - name: Install Swift
      uses: compnerd/gha-setup-swift@main
      with:
        swift-version: ${{ env.SWIFT_VERSION }}
        swift-build: ${{ env.SWIFT_BUILD }}
        cache: true

    - name: Fix swift sdk
      shell: pwsh
      run: |
        $swiftVersionDir = $env:RESOLVED_SWIFT_BUILD -replace "-RELEASE$", ""
        $SwiftPath = "$env:APPDATA\..\Local\Programs\Swift\Platforms\$swiftVersionDir\Windows.platform\Developer\SDKs\Windows.sdk\usr"
        $modulemapUrl = "https://gist.githubusercontent.com/fkunn1326/ef8be2217082302b291f2b8d4178194a/raw/c424968c250afcd5afa1131aea1329dc0744a7f9/ucrt.modulemap"
        $destination = "$SwiftPath\share\ucrt.modulemap"
        Invoke-WebRequest -Uri $modulemapUrl -OutFile $destination
    
    - name: Install Protoc
      uses: arduino/setup-protoc@v3

    - name: Setup Node cache
      uses: actions/setup-node@v4
      with:
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install cargo-make (if missing)
      shell: pwsh
      run: |
        if (Get-Command cargo-make -ErrorAction SilentlyContinue) {
          cargo make --version
        } else {
          cargo install --locked cargo-make
        }

    - name: Cache prebuilt llama and zenz model
      id: cache-llama-zenz
      uses: actions/cache@v4
      with:
        path: |
          llama_cpu
          llama_cuda
          llama_vulkan
          zenz.gguf
        key: ${{ runner.os }}-llama-${{ env.LLAMA_RELEASE_VERSION }}-zenz-v3-small-q5km-${{ hashFiles('.github/workflows/actions.yml') }}
        restore-keys: |
          ${{ runner.os }}-llama-${{ env.LLAMA_RELEASE_VERSION }}-zenz-v3-small-q5km-

    - name: Download prebuilt llama and zenz model
      if: steps.cache-llama-zenz.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        function Download-Extract {
          param (
            [string]$url,
            [string]$destFolder
          )
          $tempZip = Join-Path $env:TEMP ([System.IO.Path]::GetRandomFileName() + ".zip")
          Invoke-WebRequest -Uri $url -OutFile $tempZip
          New-Item -Path $destFolder -ItemType Directory -Force
          Expand-Archive -Path $tempZip -DestinationPath $destFolder -Force
          Remove-Item $tempZip
        }

        # Create directories
        $llamaCpuDir = "llama_cpu"
        $llamaCudaDir = "llama_cuda"
        $llamaVulkanDir = "llama_vulkan"
        New-Item -Path $llamaCpuDir, $llamaCudaDir, $llamaVulkanDir -ItemType Directory -Force

        # Download and extract files
        Download-Extract -url "${{ env.LLAMA_CPU_URL }}" -destFolder $llamaCpuDir
        Download-Extract -url "${{ env.LLAMA_CUDA_URL }}" -destFolder $llamaCudaDir
        Download-Extract -url "${{ env.LLAMA_VULKAN_URL }}" -destFolder $llamaVulkanDir

        # Download the zenz model
        $zenzDest = "zenz.gguf"
        Invoke-WebRequest -Uri "${{ env.ZENZ_MODEL_URL }}" -OutFile $zenzDest

    - name: Prepare llama.lib
      shell: pwsh
      run: |
        Copy-Item "llama_cpu\llama.lib" -Destination "server-swift\" -Force

    - name: Install node dependencies
      run: |
        cd frontend
        npm ci --prefer-offline --no-audit

    - name: Build
      run: cargo make build --release

    - name: Upload Setup Artifact
      uses: actions/upload-artifact@v4
      with:
        name: azookey-setup
        path: build/azookey-setup.exe
        if-no-files-found: error
