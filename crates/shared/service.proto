syntax = "proto3";

package azookey;

message Suggestion {
  string text = 1;    // The main suggestion text.
  string subtext = 2; // Additional information or subtext for the suggestion.
  int32 corresponding_count = 3;
  uint64 candidate_id = 4;
}

// ComposingText represents the text and its associated suggestions.
message ComposingText {
  string hiragana = 1; // The main text content.
  repeated Suggestion suggestions = 2; // List of suggestions for the text.
}

enum InputStyle {
  ROMAN2KANA = 0;
  DIRECT = 1;
}

// Request message for AppendText.
message AppendTextRequest {
  string text_to_append = 1; // The text to append to the current content.
  InputStyle input_style = 2;
  uint64 request_id = 3;
}

// Response message for AppendText.
message AppendTextResponse {
  ComposingText composing_text = 1; // The resulting text and suggestions.
  uint64 server_session_id = 2; // Identifies the current server process session.
}

// A client-observed successful mutation used to rebuild server composition
// after an ambiguous transport failure. Replaying the complete log after a
// clear is intentionally idempotent.
enum CompositionOperationKind {
  COMPOSITION_OPERATION_KIND_APPEND = 0;
  COMPOSITION_OPERATION_KIND_REMOVE = 1;
  COMPOSITION_OPERATION_KIND_MOVE_CURSOR = 2;
}

message CompositionOperation {
  CompositionOperationKind kind = 1;
  string text = 2;
  InputStyle input_style = 3;
  int32 cursor_offset = 4;
}

message ReplaceCompositionRequest {
  repeated CompositionOperation operations = 1;
  uint64 request_id = 2;
}

message ReplaceCompositionResponse {
  ComposingText composing_text = 1;
  uint64 server_session_id = 2;
}

// Request message for RemoveText.
message RemoveTextRequest {
  uint64 request_id = 1;
}

// Response message for RemoveText.
message RemoveTextResponse {
  ComposingText composing_text = 1; // The resulting text and suggestions.
  uint64 server_session_id = 2; // Identifies the current server process session.
}

message MoveCursorRequest {
  int32 offset = 1; // Relative cursor movement in input units.
  uint64 request_id = 2;
}

enum CompositionSnapshotOperation {
  COMPOSITION_SNAPSHOT_OPERATION_UNSPECIFIED = 0;
  COMPOSITION_SNAPSHOT_OPERATION_CLEAR = 1;
  COMPOSITION_SNAPSHOT_OPERATION_PUSH = 2;
  COMPOSITION_SNAPSHOT_OPERATION_POP = 3;
}

message UpdateCompositionSnapshotRequest {
  CompositionSnapshotOperation operation = 1;
  uint64 request_id = 2;
}

message UpdateCompositionSnapshotResponse {
  uint64 server_session_id = 1;
}

// Request message for ShrinkText.
message ShrinkTextRequest {
  int32 offset = 1;
  uint64 request_id = 2;
}

message ShrinkTextResponse {
  ComposingText composing_text = 1; // The resulting text and suggestions.
  uint64 server_session_id = 2; // Identifies the current server process session.
}

// Advances clause navigation as one server-side transaction. The snapshot is
// pushed before shrinking so moving left can restore the previous clause.
message AdvanceClauseRequest {
  int32 offset = 1;
  uint64 request_id = 2;
}

message AdvanceClauseResponse {
  ComposingText shrunk_text = 1;
  ComposingText navigation_text = 2;
  uint64 server_session_id = 3;
}

message PreparedClauseAdvance {
  ComposingText shrunk_text = 1;
  ComposingText navigation_text = 2;
}

message PrepareFutureClausesRequest {
  int32 initial_offset = 1;
  uint64 request_id = 2;
}

message PrepareFutureClausesResponse {
  repeated PreparedClauseAdvance advances = 1;
  uint64 server_session_id = 2;
}

// Response message for MoveCursor.
message MoveCursorResponse {
  ComposingText composing_text = 1; // The resulting text and suggestions.
  uint64 server_session_id = 2; // Identifies the current server process session.
}

// Request message for ClearText.
message ClearTextRequest {
  uint64 request_id = 1;
}

// Response message for ClearText.
message ClearTextResponse {
  uint64 server_session_id = 1; // Identifies the current server process session.
}

message SetContextRequest {
  string context = 1;
  uint64 request_id = 2;
}

message SetContextResponse {
  uint64 server_session_id = 1; // Identifies the current server process session.
}

message UpdateConfigRequest {
  uint64 request_id = 1;
}
message UpdateConfigResponse {
  uint64 server_session_id = 1; // Identifies the current server process session.
}

enum LearningCommitKind {
  LEARNING_COMMIT_KIND_UNSPECIFIED = 0;
  LEARNING_COMMIT_KIND_NORMAL = 1;
  LEARNING_COMMIT_KIND_PUNCTUATION = 2;
  LEARNING_COMMIT_KIND_PARTIAL = 3;
}

message CommitLearningCandidateRequest {
  uint64 candidate_id = 1;
  LearningCommitKind commit_kind = 2;
  uint64 request_id = 3;
}

message CommitLearningCandidateResponse {
  uint64 server_session_id = 1; // Identifies the current server process session.
}

message ResetLearningMemoryRequest {
  uint64 request_id = 1;
}

message ResetLearningMemoryResponse {
  uint64 server_session_id = 1; // Identifies the current server process session.
  bool reset = 2;
}

message PerformanceLogRequest {
  uint64 request_id = 1;
  string component = 2;
  string operation = 3;
  string stage = 4;
  uint64 elapsed_ms = 5;
  string details = 6;
}

message PerformanceLogResponse {}


// Service definition for text editing operations.
service AzookeyService {
  rpc AppendText (AppendTextRequest) returns (AppendTextResponse);
  rpc ReplaceComposition (ReplaceCompositionRequest) returns (ReplaceCompositionResponse);
  rpc RemoveText (RemoveTextRequest) returns (RemoveTextResponse);
  rpc ShrinkText (ShrinkTextRequest) returns (ShrinkTextResponse);
  rpc AdvanceClause (AdvanceClauseRequest) returns (AdvanceClauseResponse);
  rpc PrepareFutureClauses (PrepareFutureClausesRequest) returns (PrepareFutureClausesResponse);
  rpc MoveCursor (MoveCursorRequest) returns (MoveCursorResponse);
  rpc UpdateCompositionSnapshot (UpdateCompositionSnapshotRequest) returns (UpdateCompositionSnapshotResponse);
  rpc ClearText (ClearTextRequest) returns (ClearTextResponse);
  rpc SetContext (SetContextRequest) returns (SetContextResponse);
  rpc UpdateConfig (UpdateConfigRequest) returns (UpdateConfigResponse);
  rpc CommitLearningCandidate (CommitLearningCandidateRequest) returns (CommitLearningCandidateResponse);
  rpc ResetLearningMemory (ResetLearningMemoryRequest) returns (ResetLearningMemoryResponse);
  rpc LogPerformance (PerformanceLogRequest) returns (PerformanceLogResponse);
}
